apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: mindcare
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: traitement-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['traitement-service:8081']
      - job_name: ordonnance-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ['ordonnance-service:8083']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: mindcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: mindcare
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
