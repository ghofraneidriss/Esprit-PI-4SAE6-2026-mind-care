name: Backend CI/CD

on:
  push:
    branches: [ "volunteer" ]
  pull_request:
    branches: [ "volunteer" ]

jobs:
  backend:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: medical_report_service
            image: medical-report-service
          - service: volunteer
            image: volunteering-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build JAR
        run: mvn -B -pl ${{ matrix.service }} -am clean package -DskipTests

      - name: Run tests
        run: mvn -B -pl ${{ matrix.service }} -am test

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.image }}:latest

      - name: Deploy simulation
        run: echo "Deploying ${{ matrix.service }}"
