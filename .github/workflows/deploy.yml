name: Build and Push to Harbor

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Login to Harbor
      run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ secrets.HARBOR_HOST }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

    - name: Build and Push Activities Service
      run: |
        docker build -t ${{ secrets.HARBOR_HOST }}/quiz-app/activities-service:latest ./Activities_service
        docker push ${{ secrets.HARBOR_HOST }}/quiz-app/activities-service:latest

    - name: Build and Push Movement Service
      run: |
        docker build -t ${{ secrets.HARBOR_HOST }}/quiz-app/movement-service:latest ./movement_service
        docker push ${{ secrets.HARBOR_HOST }}/quiz-app/movement-service:latest
