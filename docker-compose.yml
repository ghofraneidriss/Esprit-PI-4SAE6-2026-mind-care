version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: alzcare-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - mindcare-network

  # Lost Item Service
  lost-item-service:
    image: ghofraneidriss/lost-item-service:latest
    container_name: alzcare-lost-item-service
    ports:
      - "8082:8080"
      - "9010:9010"
    environment:
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=lost-item-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/lost_item_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_ENABLED=false
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - JAVA_OPTS=-Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.rmi.port=9010 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false
    restart: unless-stopped
    networks:
      - mindcare-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Follow-up Alert Service
  followup-alert-service:
    image: ghofraneidriss/followup-alert-service:latest
    container_name: alzcare-followup-alert-service
    ports:
      - "8090:8080"
      - "9011:9010"
    environment:
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=followup-alert-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/followup_alert_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_ENABLED=false
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - JAVA_OPTS=-Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.rmi.port=9010 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false
    restart: unless-stopped
    networks:
      - mindcare-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nexus Repository Manager
  nexus:
    image: sonatype/nexus3:latest
    container_name: alzcare-nexus
    ports:
      - "8081:8081"
    environment:
      - NEXUS_CONTEXT=nexus
    volumes:
      - nexus_data:/nexus-data
    restart: unless-stopped
    networks:
      - mindcare-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/service/rest/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Prometheus Metrics Collector
  prometheus:
    image: prom/prometheus:latest
    container_name: alzcare-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - mindcare-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: alzcare-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - mindcare-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  mindcare-network:
    driver: bridge
    name: mindcare-network

volumes:
  mysql_data:
    name: alzcare-mysql-data
  nexus_data:
    name: alzcare-nexus-data
  prometheus_data:
    name: alzcare-prometheus-data
  grafana_data:
    name: alzcare-grafana-data
