version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: alzcare-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - mindcare-network

  # Lost Item Service
  lost-item-service:
    build:
      context: ./server/lost-item-service
      dockerfile: Dockerfile
    container_name: alzcare-lost-item-service
    ports:
      - "8082:8080"
      - "9010:9010"
    environment:
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=lost-item-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/lost_item_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_ENABLED=false
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - JAVA_OPTS=-Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.rmi.port=9010 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false
    restart: unless-stopped
    networks:
      - mindcare-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Follow-up Alert Service
  followup-alert-service:
    build:
      context: ./server/followupalert-service
      dockerfile: Dockerfile
    container_name: alzcare-followup-alert-service
    ports:
      - "8090:8080"
      - "9011:9010"
    environment:
      - SERVER_PORT=8080
      - SPRING_APPLICATION_NAME=followup-alert-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/followup_alert_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - EUREKA_CLIENT_ENABLED=false
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - JAVA_OPTS=-Dcom.sun.management.jmxremote=true -Dcom.sun.management.jmxremote.port=9010 -Dcom.sun.management.jmxremote.rmi.port=9010 -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false
    restart: unless-stopped
    networks:
      - mindcare-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mindcare-network:
    driver: bridge
    name: mindcare-network

volumes:
  mysql_data:
    name: alzcare-mysql-data
