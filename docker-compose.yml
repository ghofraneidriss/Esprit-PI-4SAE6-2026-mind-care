services:
  mysql:
    image: mysql:8.4
    container_name: mindcare-mysql
    environment:
      MYSQL_DATABASE: alzheimer_db
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 10

  traitement-service:
    container_name: mindcare-traitement
    build:
      context: ./backoffice
      dockerfile: traitement_et_consultation/Dockerfile
    image: mindcare-traitement:latest
    ports:
      - '8081:8081'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/alzheimer_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ''
      EUREKA_CLIENT_ENABLED: 'false'
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy

  ordonnance-service:
    container_name: mindcare-ordonnance
    build:
      context: ./backoffice
      dockerfile: ordonnance_et_medicaments/Dockerfile
    image: mindcare-ordonnance:latest
    ports:
      - '8083:8083'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/alzheimer_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ''
      EUREKA_CLIENT_ENABLED: 'false'
      TRAITEMENT_SERVICE_URL: http://traitement-service:8081
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
    depends_on:
      mysql:
        condition: service_healthy
      traitement-service:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: mindcare-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - ordonnance-service
      - traitement-service

  grafana:
    image: grafana/grafana:11.3.1
    container_name: mindcare-grafana
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  mysql-data:
  grafana-data:
