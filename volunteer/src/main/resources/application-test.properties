spring.application.name=volunteer
server.port=8085

# H2 Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Disable OAuth2 for testing
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/pi-app-realm

users.service.url=http://localhost:8082

# Twilio Configuration (disabled for test)
twilio.account.sid=
twilio.auth.token=
twilio.phone.number=

# Actuator Configuration for Monitoring
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=volunteer-service
