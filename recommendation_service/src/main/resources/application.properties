spring.application.name=recommendation_service
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/recommendation_db?createDatabaseIfNotExist=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.docker.compose.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

app.recommendation.archive-cron=0 0 * * * *
app.recommendation.escalation-threshold=3
app.medical-event.complete-cron=0 5 * * * *
app.souvenir-service.base-url=http://localhost:8086
