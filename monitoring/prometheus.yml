global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: recommendation_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8087

  - job_name: souvenir_service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8088

  - job_name: http_probes
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - http://host.docker.internal:8080/login
          - http://host.docker.internal:9000/api/system/status
          - http://host.docker.internal:8087/actuator/health
          - http://host.docker.internal:8088/actuator/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
