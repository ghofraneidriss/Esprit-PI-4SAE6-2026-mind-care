version: '3.8'

services:
  traitement-service:
    build:
      context: ./backoffice/traitement_et_consultation
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=dev

  ordonnance-service:
    build:
      context: ./backoffice/ordonnance_et_medicaments
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
