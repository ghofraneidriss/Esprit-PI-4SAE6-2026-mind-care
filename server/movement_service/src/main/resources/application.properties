spring.application.name=movement-service
server.port=8086

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=${MOVEMENT_DB_URL:jdbc:mysql://localhost:3306/movement_db?createDatabaseIfNotExist=true}
spring.datasource.username=${MOVEMENT_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${MOVEMENT_DB_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.docker.compose.enabled=false

localization.service.base-url=${LOCALIZATION_SERVICE_API_BASE:http://localhost:8085/api}
users.service.base-url=${USERS_SERVICE_API_BASE:http://localhost:8081/api}

movement.alerts.abrupt-distance-meters=300
movement.alerts.immobile-seconds=20
movement.alerts.immobile-radius-meters=25
movement.alerts.no-gps-minutes=30
movement.alerts.cooldown-minutes=20
movement.alerts.no-gps-check-ms=600000
movement.alerts.immobility-check-ms=10000

movement.alert.email.to=${MOVEMENT_ALERT_ADMIN_EMAIL:}
movement.alert.email.from=${MOVEMENT_ALERT_FROM:${spring.mail.username:}}

# Email caregiver + volunteer when patient taps "Send my GPS" (BROWSER_GPS). Requires SMTP.
movement.notify.email.on-live-gps=${MOVEMENT_NOTIFY_ON_LIVE_GPS:false}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_APP_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
