spring.application.name=incident-service
server.port=8083

# Database Configuration
spring.datasource.url=${INCIDENT_DB_URL:jdbc:mysql://localhost:3306/incident_db?createDatabaseIfNotExist=true}
spring.datasource.username=${INCIDENT_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
# show-sql=false : les logs SQL sur chaque requête ralentissent fortement l'API (surtout les listes).
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Pool JDBC : échec rapide si MySQL est down (évite d'attendre ~1 min)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.validation-timeout=3000

# Cache mémoire des types d'incident (liste stable, peu de lignes)
spring.cache.type=caffeine
spring.cache.cache-names=incidentTypes
spring.cache.caffeine.spec=maximumSize=20,expireAfterWrite=24h

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# H2 Console (for debugging if needed)
spring.h2.console.enabled=true

# =====================================================
# Email Configuration (Gmail SMTP)
# =====================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mouhanedmliki66@gmail.com
spring.mail.password=mpuo sovj eglf ivhc
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =====================================================
# Eureka Client — enregistrement auprès du serveur
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
