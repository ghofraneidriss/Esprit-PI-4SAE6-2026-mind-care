spring.application.name=activities-service
# Activités cognitives, quiz, photos, rapports — Eureka: activities-service
server.port=8084

spring.datasource.url=${ACTIVITIES_DB_URL:jdbc:mysql://localhost:3306/activities_db?createDatabaseIfNotExist=true}
spring.datasource.username=${ACTIVITIES_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=16MB
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jackson.serialization.write-dates-as-timestamps=false
spring.docker.compose.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

server.error.include-message=always

# SMTP (optional — configure via env in deployment)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

alzheimer.risk.threshold.high=50
alzheimer.risk.threshold.medium=70
alzheimer.alert.email.to=${ALZ_ALERT_EMAIL:}
