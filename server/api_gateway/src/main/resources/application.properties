spring.application.name=api-gateway
# Point d'entrée unique pour le frontend Angular (proxy /api → ce port)
server.port=8080

# --- Registre ports (cohérent avec server/pom.xml et ports.env.example) ---
# 8761 eureka-server | 8080 api-gateway (ce module) | 8081 users-service |
# 8082 forums-service | 8083 incident-service | 8084 activities-service |
# 8085 localization-service | 8086 movement-service

# =====================================================
# Eureka Client — s'enregistre + récupère le registre
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# =====================================================
# Routes de l'API Gateway (configuration dynamique)
# lb:// = Load Balancer via Eureka (configuration dynamique)
# Le nom après lb:// doit correspondre au spring.application.name du microservice
# =====================================================

# --- Forums Service (port 8082, name: forums-service) ---
spring.cloud.gateway.routes[0].id=FORUMS_POSTS
spring.cloud.gateway.routes[0].uri=lb://forums-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/posts/**

spring.cloud.gateway.routes[1].id=FORUMS_CATEGORIES
spring.cloud.gateway.routes[1].uri=lb://forums-service
