spring.application.name=users-service
# Auth / utilisateurs — Eureka: users-service
server.port=8089

spring.datasource.url=${USERS_DB_URL:jdbc:mysql://localhost:3306/alzheimer_db?createDatabaseIfNotExist=true}
spring.datasource.username=${USERS_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
# show-sql=false : évite le surcoût I/O sur chaque requête (dev plus réactif).
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.jackson.serialization.write-dates-as-timestamps=false
spring.docker.compose.enabled=false

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# =====================================================
# Eureka Client — enregistrement auprès du serveur
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# =====================================================
# Groq API Key (Chatbot - Llama 3)
# Get your free key at: https://console.groq.com
# =====================================================
groq.api.key=${GROQ_API_KEY:}
