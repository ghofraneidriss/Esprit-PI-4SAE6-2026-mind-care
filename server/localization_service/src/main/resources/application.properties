spring.application.name=localization-service
server.port=8087

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=${LOCALIZATION_DB_URL:jdbc:mysql://localhost:3306/localization_db?createDatabaseIfNotExist=true}
spring.datasource.username=${LOCALIZATION_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=${LOCALIZATION_DB_PASSWORD:${DB_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.docker.compose.enabled=false
