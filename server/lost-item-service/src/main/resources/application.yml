server:
  port: 8080

spring:
  application:
    name: lost-item-service
  datasource:
    url: jdbc:mysql://localhost:3306/lost_item_db?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  # ── Spring AI — Groq (OpenAI-compatible) ────────────────────────────────
  ai:
    openai:
      api-key: ${GROQ_API_KEY:your-groq-api-key-here}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.3
          max-tokens: 1024

eureka:
  client:
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

services:
  users-service:
    url: http://localhost:8082
