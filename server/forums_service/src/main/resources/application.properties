spring.application.name=forums-service
# Forum — Eureka: forums-service
server.port=8085

# Encodage HTTP / JSON (évite les caractères cassés côté client).
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Ne pas utiliser sessionVariables=max_allowed_packet=… dans l’URL : sur certains MySQL (RDS, Azure, utilisateur non privilégié)
# cela provoque « SESSION variable max_allowed_packet is read-only » au démarrage.
# Pour les photos LONGBLOB, augmenter max_allowed_packet côté serveur (my.cnf / my.ini) ou via SET GLOBAL (admin).
spring.datasource.url=${FORUM_DB_URL:jdbc:mysql://localhost:3306/forum_db?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${FORUM_DB_USERNAME:${DB_USERNAME:root}}
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=48MB

# Forum métier — archivage automatique après inactivité (0 = désactivé).
# 10 min sans commentaire/réaction/vue (voir ForumMaintenanceService).
mindcare.forum.inactive-idle-minutes=10
mindcare.forum.inactive-scan-ms=60000
mindcare.users.notifications-url=${USERS_NOTIFICATIONS_URL:http://localhost:8081/api/users/notifications}

# Display names for post/comment authors (first + last name from users-service)
users.service.base-url=${USERS_SERVICE_BASE_URL:http://localhost:8081/api}

# --- Comment moderation (Hugging Face Inference API) ---
# Colle ton token Read ci-dessous (local uniquement — ne pousse pas ce fichier sur un dépôt public).
mindcare.forum.moderation.enabled=true
mindcare.forum.moderation.huggingface.api-token=${HUGGINGFACE_API_TOKEN:}
# Ancienne URL api-inference.huggingface.co → HTTP 410 ; utiliser le routeur HF.
mindcare.forum.moderation.huggingface.api-base=https://router.huggingface.co/hf-inference/models
mindcare.forum.moderation.huggingface.model-id=unitary/toxic-bert
mindcare.forum.moderation.score-threshold=0.55
# Placeholder stocké en base (ASCII + anglais = pas de souci d’encodage). L’UI publique affiche un bloc dédié.
mindcare.forum.moderation.masked-text=[Comment removed - does not meet community standards.]
# Si l’API Hugging Face échoue, mots grossiers évidents (FR/EN) sont quand même masqués.
mindcare.forum.moderation.local-fallback.enabled=true

# =====================================================
# Eureka Client — enregistrement auprès du serveur
# =====================================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
