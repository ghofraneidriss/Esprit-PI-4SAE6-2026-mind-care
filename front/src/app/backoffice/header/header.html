            <div class="vr my-3"></div>
            <div class="dropdown text-end ms-sm-3 ms-2 ms-lg-4">
                <a routerLink="/admin/profile" class="d-flex align-items-center py-2">
                    <div class="text-end me-2 d-none d-lg-inline-block">
                        <div class="fw-bold text-dark text-nowrap">Robert Brown</div>
                        <small class="text-body d-block lh-sm">Manager</small>
                    </div>
                    <div class="avatar avatar-sm rounded-circle avatar-status-success">
                        <img src="/assets/backoffice/images/avatar/avatar1.webp" alt="">
                    </div>
                </a>
                <ul class="dropdown-menu dropdown-menu-end w-225px mt-1">
                    <li>
                        <a class="dropdown-item d-flex align-items-center gap-2" routerLink="/admin/profile">
                            <i class="fi fi-rr-user scale-1x"></i> Profil
                        </a>

                    <li>
                        <a class="dropdown-item d-flex align-items-center gap-2 text-danger" routerLink="/auth/login">

<div class="modal fade" id="searchResultsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header py-1 px-3">
                <form class="d-flex align-items-center position-relative w-100">
                    <i class="fi fi-rr-search position-absolute start-0 ms-2"></i>
                    <input type="text" class="form-control form-control-lg ps-5 border-0 shadow-none"
                        placeholder="Rechercher...">
                </form>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body pb-2" style="height: 300px;">
                <span class="text-uppercase text-2xs fw-semibold text-muted d-block mb-2">Recherches récentes:</span>
                <ul class="list-inline search-list">
                    <li><a class="search-item" routerLink="/admin/recommendation">Recommandations</a></li>
                    <li><a class="search-item" routerLink="/admin/medical-events">Évènements Médicaux</a></li>
                </ul>
            </div>
        </div>
    </div>
</div>
