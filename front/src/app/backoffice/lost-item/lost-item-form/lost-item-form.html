<div class="container-fluid py-4" style="max-width:760px;">

  <div class="d-flex align-items-center mb-4 gap-3">
    <button class="btn btn-sm btn-outline-secondary" (click)="cancel()">
      <i class="fi fi-rr-arrow-left me-1"></i> Back
    </button>
    <h5 class="mb-0" style="color:#6b1fad;font-weight:700;">
      {{ isEditMode ? 'Edit Lost Item' : 'Report a Lost Item' }}
    </h5>
  </div>

  <div *ngIf="formError" class="alert alert-danger">
    <i class="fi fi-rr-exclamation me-2"></i>{{ formError }}
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <div class="row g-3">

          <!-- Title -->
          <div class="col-12">
            <label class="form-label fw-semibold">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="title"
                   [class.is-invalid]="isInvalid('title')"
                   placeholder="e.g., Blue wallet, Red jacket…">
            <div class="invalid-feedback">Title is required (2–100 characters).</div>
          </div>

          <!-- Description -->
          <div class="col-12">
            <label class="form-label fw-semibold">Description</label>
            <textarea class="form-control" formControlName="description" rows="3"
                      placeholder="Describe the item in detail…"></textarea>
          </div>

          <!-- Category + Priority -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Category <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="category" [class.is-invalid]="isInvalid('category')">
              <option value="">Select category…</option>
              <option *ngFor="let c of categoryOptions" [value]="c.value">{{ c.label }}</option>
            </select>
            <div class="invalid-feedback">Category is required.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Priority</label>
            <select class="form-select" formControlName="priority">
              <option *ngFor="let p of priorityOptions" [value]="p.value">{{ p.label }}</option>
            </select>
          </div>

          <!-- Patient field: locked for PATIENT role, dropdown for CAREGIVER, manual for ADMIN/DOCTOR -->
          <div class="col-md-6">
            <label class="form-label fw-semibold">Patient <span class="text-danger">*</span></label>

            <!-- PATIENT: read-only, auto-filled -->
            <ng-container *ngIf="isPatient">
              <input type="number" class="form-control bg-light" formControlName="patientId" readonly>
              <small class="text-muted"><i class="fi fi-rr-lock me-1"></i>Auto-filled — this is your account</small>
            </ng-container>

            <!-- CAREGIVER: dropdown of assigned patients -->
            <ng-container *ngIf="isCaregiver">
              <select class="form-select" formControlName="patientId" [class.is-invalid]="isInvalid('patientId')">
                <option [value]="null">
                  {{ patientsLoading ? 'Loading patients…' : 'Select patient…' }}
                </option>
                <option *ngFor="let p of patients" [value]="p.userId">
                  {{ p.firstName }} {{ p.lastName }} (#{{ p.userId }})
                </option>
              </select>
            </ng-container>

            <!-- ADMIN / DOCTOR: manual input -->
            <ng-container *ngIf="!isPatient && !isCaregiver">
              <input type="number" class="form-control" formControlName="patientId"
                     [class.is-invalid]="isInvalid('patientId')" placeholder="Patient user ID">
            </ng-container>

            <div class="invalid-feedback">Patient is required.</div>
          </div>
          <div class="col-md-6">
            <label class="form-label fw-semibold">Caregiver ID</label>
            <input type="number" class="form-control" formControlName="caregiverId"
                   [readonly]="isCaregiver" placeholder="Auto-filled from session">
            <small *ngIf="isCaregiver" class="text-muted">Auto-filled from your account</small>
          </div>

          <!-- Last Seen Location + Date -->
          <div class="col-md-8">
            <label class="form-label fw-semibold">Last Seen Location</label>
            <input type="text" class="form-control" formControlName="lastSeenLocation"
                   placeholder="e.g., Living room, Hospital room 12…">
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Last Seen Date</label>
            <input type="date" class="form-control" formControlName="lastSeenDate">
          </div>

          <!-- Status (edit mode only) -->
          <div class="col-md-6" *ngIf="isEditMode">
            <label class="form-label fw-semibold">Status</label>
            <select class="form-select" formControlName="status">
              <option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</option>
            </select>
          </div>

          <!-- Image URL -->
          <div class="col-12">
            <label class="form-label fw-semibold">Image URL</label>
            <input type="url" class="form-control" formControlName="imageUrl"
                   placeholder="https://…">
          </div>

        </div>

        <div class="d-flex gap-2 mt-4 justify-content-end">
          <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancel</button>
          <button type="submit" class="btn" style="background:#6b1fad;color:#fff;" [disabled]="isSaving">
            <span *ngIf="isSaving" class="spinner-border spinner-border-sm me-2"></span>
            {{ isEditMode ? 'Save Changes' : 'Report Item' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
