<header id="header" class="header d-flex align-items-center fixed-top">
  <div class="container position-relative d-flex align-items-center justify-content-between">

    <a routerLink="/" class="logo d-flex align-items-center me-auto me-xl-0">
      <!-- Uncomment the line below if you also wish to use an image logo -->
      <!-- <img src="assets/frontoffice/img/logo.webp" alt=""> -->
      <h1 class="sitename">Medi<span>Nest</span></h1>
    </a>

    <nav id="navmenu" class="navmenu">
      <ul>
        <li><a routerLink="/" class="active">Home</a></li>
        <li><a routerLink="/about">About</a></li>
        <li><a routerLink="/contact">Contact</a></li>
      </ul>
      <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
    </nav>

    <div class="d-flex align-items-center gap-3">
      <a *ngIf="isLoggedIn" routerLink="/patient-profile"
        class="btn btn-outline-primary rounded-circle p-2 d-flex align-items-center justify-content-center"
        title="My Profile" style="width: 40px; height: 40px;">
        <i class="bi bi-person-fill fs-5"></i>
      </a>
      <a *ngIf="!isLoggedIn" routerLink="/auth/login"
        class="btn btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center"
        title="Login" style="width: 40px; height: 40px;">
        <i class="bi bi-person fs-5"></i>
      </a>
      <a class="btn-getstarted m-0" routerLink="/appointment">Appointment</a>
    </div>

  </div>
</header>
