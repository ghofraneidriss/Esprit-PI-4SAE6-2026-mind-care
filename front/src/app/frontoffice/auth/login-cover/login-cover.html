
  <div class="page-layout">

    <div class="auth-cover-wrapper">
      <div class="row g-0">
        <div class="col-md-6 order-md-1">
          <div class="auth-cover auth-cover-mindcare">
            <div class="clearfix">
              <img
                src="assets/branding/alzcare-logo-3d.png"
                alt="MindCare"
                class="img-fluid auth-cover-logo-mindcare"
                width="360"
                height="360"
                decoding="async"
                fetchpriority="low"
              />
              <div class="auth-content">
                <h1 class="auth-cover-title">Welcome</h1>
                <p class="auth-cover-lead mb-0">
                  MindCare — care platform for Alzheimer patients. Sign in to access your space.
                </p>
              </div>
            </div>
          </div>
        </div>
        <div class="col-md-6 align-self-center">
          <div class="px-3 py-5 p-sm-5">
            <div class="auth-form-panel m-auto">
            <div class="mb-4 text-center">
              <a routerLink="/" class="d-inline-flex align-items-center justify-content-center gap-2 text-decoration-none auth-form-brand">
                <img src="assets/branding/alzcare-logo-3d.png" alt="MindCare" width="52" height="52" class="rounded-2" />
                <span class="text-primary">MindCare</span>
              </a>
            </div>
            <div class="text-center mb-5">
              <h2 class="auth-form-heading mb-2">Sign in</h2>
              <p class="auth-form-sub mb-0">Enter your credentials to access your account.</p>
            </div>

            <form (ngSubmit)="onLogin()">
              <div class="mb-4">
                <label class="form-label" for="loginEmail">Email</label>
                <input type="email" class="form-control" id="loginEmail"
                       [(ngModel)]="email" name="email"
                       placeholder="you@example.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label" for="loginPassword">Password</label>
                <input type="password" class="form-control" id="loginPassword"
                       [(ngModel)]="password" name="password"
                       placeholder="••••••••" required>
              </div>

              <div class="mb-3" *ngIf="errorMessage">
                <div class="alert alert-danger py-2">{{ errorMessage }}</div>
              </div>

              <div class="mb-3">
                <button type="submit" class="btn btn-primary waves-effect waves-light w-100" [disabled]="loading">
                  {{ loading ? 'Signing in…' : 'Sign in' }}
                </button>
              </div>
              <p class="mb-3 text-center">
                No account yet? <a routerLink="/register-cover">Create one</a>
              </p>
            </form>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
