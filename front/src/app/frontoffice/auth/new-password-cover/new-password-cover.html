<div class="page-layout">
  <div class="auth-cover-wrapper">
    <div class="row g-0">
      <div class="col-md-6 order-md-1">
        <div class="auth-cover">
          <div class="clearfix">
            <img src="assets/backoffice/images/auth/vector1.svg" alt="" class="img-fluid cover-img">
            <div class="auth-content">
              <h1 class="display-6 fw-bold">Set New Password</h1>
              <p>Choose a strong password for your MindCare account. You'll use it to log in going forward.</p>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6 align-self-center">
        <div class="px-3 py-5 p-sm-5 maxw-450px m-auto">

          <div class="mb-4 text-center">
            <a routerLink="/" aria-label="MindCare logo">
              <img class="visible-light" src="assets/backoffice/images/logo.svg" alt="MindCare logo">
            </a>
          </div>

          <div class="text-center mb-5">
            <h5 class="mb-1">Create New Password</h5>
            <p class="text-muted">Enter and confirm your new password below.</p>
          </div>

          <!-- Invalid / missing token -->
          <div *ngIf="tokenMissing" class="alert alert-danger text-center">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Invalid or missing reset link.
            <div class="mt-2">
              <a routerLink="/auth/forgot-password-cover" class="btn btn-sm btn-outline-danger">
                Request a new one
              </a>
            </div>
          </div>

          <!-- Success -->
          <div *ngIf="successMsg" class="alert alert-success d-flex align-items-center gap-2">
            <i class="bi bi-check-circle-fill"></i>
            {{ successMsg }}
          </div>

          <!-- Error -->
          <div *ngIf="errorMsg" class="alert alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ errorMsg }}
          </div>

          <form (ngSubmit)="onSubmit()" *ngIf="!tokenMissing && !successMsg">

            <div class="mb-4">
              <label class="form-label" for="newPassword">New Password</label>
              <input type="password" class="form-control" id="newPassword"
                     placeholder="Min. 6 characters"
                     [(ngModel)]="password" name="password" required minlength="6">
            </div>

            <div class="mb-4">
              <label class="form-label" for="confirmPassword">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword"
                     placeholder="Repeat your password"
                     [(ngModel)]="confirmPassword" name="confirmPassword" required>
              <div *ngIf="confirmPassword && password !== confirmPassword"
                   class="text-danger small mt-1">
                Passwords do not match.
              </div>
            </div>

            <div class="clearfix">
              <button type="submit" class="btn btn-primary waves-effect waves-light w-100 mb-3"
                      [disabled]="isLoading || (!!confirmPassword && password !== confirmPassword)">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? 'Resetting…' : 'Reset Password' }}
              </button>
              <a routerLink="/auth/login" class="btn btn-light waves-effect waves-light w-100">
                Back to Login
              </a>
            </div>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
