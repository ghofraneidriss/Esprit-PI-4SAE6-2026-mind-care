<div class="page-layout">
  <div class="auth-cover-wrapper">
    <div class="row g-0">
      <div class="col-md-6 order-md-1">
        <div class="auth-cover">
          <div class="clearfix">
            <img src="assets/backoffice/images/auth/vector1.svg" alt="" class="img-fluid cover-img">
            <div class="auth-content">
              <h1 class="display-6 fw-bold">Reset Your Password</h1>
              <p>Enter the email address linked to your MindCare account and we'll send you a link to reset your password.</p>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6 align-self-center">
        <div class="px-3 py-5 p-sm-5 maxw-450px m-auto">

          <div class="mb-4 text-center">
            <a routerLink="/" aria-label="MindCare logo">
              <img class="visible-light" src="assets/backoffice/images/logo.svg" alt="MindCare logo">
            </a>
          </div>

          <div class="text-center mb-5">
            <h5 class="mb-1">Forgot Password?</h5>
            <p class="text-muted">We'll email you a secure reset link.</p>
          </div>

          <!-- Success -->
          <div *ngIf="successMsg" class="alert alert-success d-flex align-items-center gap-2">
            <i class="bi bi-check-circle-fill"></i>
            {{ successMsg }}
          </div>

          <!-- Error -->
          <div *ngIf="errorMsg" class="alert alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-circle-fill"></i>
            {{ errorMsg }}
          </div>

          <form (ngSubmit)="onSubmit()" *ngIf="!successMsg">
            <div class="mb-4">
              <label class="form-label" for="resetEmail">Email address</label>
              <input type="email" class="form-control" id="resetEmail"
                     placeholder="your@email.com"
                     [(ngModel)]="email" name="email" required>
            </div>
            <div class="clearfix">
              <button type="submit" class="btn btn-primary waves-effect waves-light w-100 mb-3"
                      [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? 'Sending…' : 'Send Reset Link' }}
              </button>
              <a routerLink="/auth/login" class="btn btn-light waves-effect waves-light w-100">
                Back to Login
              </a>
            </div>
          </form>

          <div *ngIf="successMsg" class="text-center mt-3">
            <a routerLink="/auth/login" class="btn btn-primary w-100">Back to Login</a>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
