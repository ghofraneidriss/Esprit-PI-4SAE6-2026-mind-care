server:
  port: 8080

spring:
  application:
    name: api_gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8081/realms/alzheimers-realm # Adjust realm name as configured in keycloak

  cloud:
    gateway:
      mvc:
        routes:
          - id: users-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/users/**

          - id: medical-report-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/medical-reports/**, /api/mri-scans/**, /api/files/**, /api/ai-results/**
